      const inp = el.querySelector('input, textarea, select');
      if (lab && inp) {
        const k = (lab.textContent || '').replace(/\s+/g, ' ').trim();
        const v = (inp.value != null && String(inp.value) !== undefined ? String(inp.value) : '').trim();
        if (k) lines.push(k + '：' + (v || '（空）'));
      }
      continue;
    }
    if (el.classList.contains('sec-head')) {
      lines.push('');
      lines.push('■ ' + (el.textContent || '').replace(/\s+/g, ' ').trim());
      continue;
    }
    if (el.classList.contains('inj-hint-note') || el.classList.contains('note-strip')) continue;
    if (el.classList.contains('gp-submit-bar') || el.classList.contains('gp-ack-row')) continue;
    if (el.classList.contains('submit-btn') || (el.tagName === 'BUTTON' && el.classList.contains('submit-btn'))) continue;
    if (el.classList.contains('row-label')) {
      const next = ch[i + 1];
      const hasInline = el.querySelector('input, textarea, select');
      if (hasInline) {
        const cl = el.cloneNode(true);
        cl.querySelectorAll('input, textarea, select').forEach((n) => n.remove());
        const k = (cl.textContent || '').replace(/\s+/g, ' ').trim();
        const v = (hasInline.value != null ? String(hasInline.value) : '').trim();
        if (k) lines.push(k + (v ? ' ' + v : ' （空）'));
        continue;
      }
      if (next && next.classList && next.classList.contains('radio-row')) {
        const label = (el.textContent || '').replace(/\s+/g, ' ').trim();
        const sel = next.querySelector(
          '.radio-btn.sel-ok, .radio-btn.sel-ng, .rb.ok, .rb.ng, .rb.sel-ok, .rb.sel-ng',
        );
        const tx = sel ? (sel.textContent || '').replace(/\s+/g, ' ').trim() : '（未選択）';
        lines.push(label + '：' + tx);
        i += 1;
        continue;
      }
      continue;
    }
    if (el.classList.contains('ev-grid')) {
      el.querySelectorAll('.ev-row').forEach((er) => {
        const sp = er.querySelector(':scope > span');
        const name = sp ? (sp.textContent || '').replace(/\s+/g, ' ').trim() : '';
        const okn = er.querySelector('.rb.ok, .rb.sel-ok');
        const ngn = er.querySelector('.rb.ng, .rb.sel-ng');
        let v = '（未選択）';
        if (okn) v = (okn.textContent || '').replace(/\s+/g, ' ').trim();
        else if (ngn) v = (ngn.textContent || '').replace(/\s+/g, ' ').trim();
        if (name) lines.push(name + '：' + v);
      });
      continue;
    }
    if (el.classList.contains('inj-grid')) {
      el.querySelectorAll('.inj-cell').forEach((cell) => {
        const l = cell.querySelector('.inj-label');
        const inp = cell.querySelector('input.inj-count, input[type="number"]');
        if (l && inp) {
          const n = inp.value != null && inp.value !== '' ? String(inp.value) : '0';
          lines.push((l.textContent || '').trim() + '：' + n + ' 名');
        }
      });
      continue;
    }
    if (el.tagName === 'TEXTAREA' && !el.closest('.field-group')) {
      const v = (el.value || '').trim();
      if (v) {
        const ph = (el.getAttribute('placeholder') || '追記').replace(/\s+/g, ' ').trim();
        lines.push('【' + ph + '】\n' + v);
      }
    }
  }
  return lines.join('\n');
}
async function runCopyChecklist(scope) {
  const text = buildChecklistTextSummary(scope);
  try {
    await navigator.clipboard.writeText(text);
    showToast('入力内容をクリップボードにコピーしました');
  } catch (e) {
    showToast('コピーに失敗しました。ブラウザの環境（HTTPS 等）をご確認ください。');
  }
}
async function runShareChecklist(scope) {
  const text = buildChecklistTextSummary(scope);
  const meta = getGuideMeta(GP.id) || {};
  const shareTitle = (meta.id ? '[' + meta.id + '] ' : '') + (meta.title || 'チェックリスト');
  const href = typeof location !== 'undefined' ? String(location.href) : '';
  const payloads = [
    { title: shareTitle, text, url: href },
    { title: shareTitle, text },
  ];
  let shared = false;
  let abort = false;
  if (typeof navigator !== 'undefined' && typeof navigator.share === 'function') {
    for (const payload of payloads) {
      if (typeof navigator.canShare === 'function') {
        try {
          if (!navigator.canShare(payload)) continue;
        } catch (e) {
          /* 試行 */
        }
      }
      try {
        await navigator.share(payload);
        shared = true;
        break;
      } catch (e) {
        if (e && e.name === 'AbortError') {
          abort = true;
          break;
        }
      }
    }
  }
  if (shared) showToast('共有（AirDrop / LINE / ファイル 等）を表示しました');
  else if (abort) showToast('共有をキャンセルしました');
  else showToast('この端末では共有を開けません。コピーで送ってください。');
}
function buildChecklistAckCompleteHtml(gid) {
  if (gid === '6-2') {
    return '<div class="complete-card"><div class="icon">✅</div><h2>提出済（記録済み）</h2><p>コピー・共有のうえ災害対策本部へ提出し、「提出済み」にチェックした内容はこの端末に保存されています。</p><p style="font-size:13px;color:#5a5e6a;margin-top:10px">紙手順の提出もお忘れなく。再記入する場合は下のボタンから「提出済み」チェックをやり直せます。</p><button type="button" class="btn-restart" data-gp="restart">🔄 再記入する</button></div>';
  }
  if (gid === '8-5') {
    return '<div class="complete-card"><div class="icon">✅</div><h2>提出済（記録済み）</h2><p>8-5 施設課チェックについて、同様の記録をこの端末に保存しています。</p><p style="font-size:13px;color:#5a5e6a;margin-top:10px">再記入する場合は下のボタンから「提出済み」チェックをやり直せます。</p><button type="button" class="btn-restart" data-gp="restart">🔄 再記入する</button></div>';
  }
  return '<div class="complete-card"><div class="icon">✅</div><h2>記録済み</h2><p><button type="button" class="btn-restart" data-gp="restart">🔄 再記入する</button></p></div>';
}
function onAckSubmitChange(scope, t) {
  if (t.getAttribute('data-gp') !== 'ack-submit' || !GP.id) return;
  if (t.checked) {
    if (!state.ackSubmit) state.ackSubmit = {};
    state.ackSubmit[GP.id] = true;
    saveState();
    showToast('提出済みをこの端末に保存しました。');
    renderHub();
    GP.done = true;
    GP_render();
  } else {
    if (state.ackSubmit) delete state.ackSubmit[GP.id];
    saveState();
    showToast('提出済みを解除しました。');
    renderHub();
    GP.done = false;
    GP_render();
  }
}
function bindGpEvents(scope) {
  scope.addEventListener('change', (ev) => {
    const t = ev.target;
    if (t && t.getAttribute('data-gp') === 'ack-submit') onAckSubmitChange(scope, t);
  });
  scope.addEventListener('click', (ev) => {
    const t = ev.target.closest('[data-gp]');
    if (!t) return;
    if (t.getAttribute('data-gp') === 'ack-submit') return;
    const a = t.getAttribute('data-gp');
    if (a === 'toggle') { t.classList.toggle('checked'); return; }
    if (a === 'toggleCell') { t.classList.toggle('on'); return; }
    if (a === '21-hq') { GP.branch21 = 'hq'; GP.idx = 2; GP_render(); return; }
    if (a === '21-light') { GP.branch21 = 'light'; GP.idx = 2; GP_render(); return; }
    if (a === '31-showEvac') { const el = scope.querySelector('#evacDetail'); if (el) el.classList.add('show'); return; }
    if (a === '31-hideEvac') { const el = scope.querySelector('#evacDetail'); if (el) el.classList.remove('show'); return; }
    if (a === '40-showHQ') { const h = scope.querySelector('#hqDetail'), l = scope.querySelector('#lightDetail'); if (h) h.classList.add('show'); if (l) l.classList.remove('show'); return; }
    if (a === '40-showLight') { const h = scope.querySelector('#hqDetail'), l = scope.querySelector('#lightDetail'); if (l) l.classList.add('show'); if (h) h.classList.remove('show'); return; }
    if (a === 'next') {
      if (GP.id === '2-1' && !GP.branch21 && physStepIndex() === 1) return;
      GP.idx++;
      if (GP.id === '2-1' && GP.idx > 2) GP.done = true;
      if (GP.id !== '2-1' && GP.idx > maxStepDisplay()) GP.done = true;
      GP_render();
      const gw = document.querySelector('.gp-wrap');
      if (gw) gw.scrollTop = 0;
      return;
    }
    if (a === 'copy-report') { void runCopyChecklist(scope); return; }
    if (a === 'share-report') { void runShareChecklist(scope); return; }
    if (a === 'done') { showToast('記録しました（紙の提出手順に従ってください）'); GP.done = true; GP_render(); return; }
    if (a === 'restart') {
      if (GP.id && (GP.id === '6-2' || GP.id === '8-5') && state.ackSubmit) {
        delete state.ackSubmit[GP.id];
        saveState();
        renderHub();
      }
      GP.idx = 0; GP.done = false; GP.branch21 = null; GP_render(); return;
    }
    if (a === 'sel') {
      const row = t.parentElement;
      if (row) {
        row.querySelectorAll('.radio-btn, .rb').forEach((b) => {
          b.classList.remove('sel-ok', 'sel-ng', 'ok', 'ng');
        });
      }
      const ty = t.getAttribute('data-sel');
      if (t.classList.contains('rb')) t.classList.add(ty === 'ok' ? 'ok' : 'ng');
      else t.classList.add(ty === 'ok' ? 'sel-ok' : 'sel-ng');
    }
  });
}
function GP_render() {
  const root = $('guideRoot');
  if (!root) return;
  const data = getGuideData(GP.id);
  if (!data || !data.steps) { root.innerHTML = '<p style="padding:16px">データがありません</p>'; return; }
  GP.steps = data.steps;
  GP.pattern = data.pattern || 'STEPS';
  const wrap = document.createElement('div');
  wrap.className = 'gp-wrap';
  const st = document.createElement('style');
  st.textContent = GP_GUIDE_CSS;
  const body = document.createElement('div');
  body.className = 'gp-guide-body';
  if (isSingleCard()) {
    if (GP.done && (GP.id === '6-2' || GP.id === '8-5')) {
      body.innerHTML = buildChecklistAckCompleteHtml(GP.id);
    } else {
      body.innerHTML = adaptGuideInlineHandlers(GP.steps[0].innerHTML);
      setTimeout(() => { initChecklistForm(body); }, 0);
    }
    wrap.appendChild(st);
    wrap.appendChild(body);
    root.innerHTML = '';
    root.appendChild(wrap);
    bindGpEvents(body);
    return;
  }
  const pidx = physStepIndex();
  const stp = GP.steps[pidx];
  if (GP.done) {
    const meta = getGuideMeta(GP.id) || {};
    body.innerHTML = '<div class="complete-card"><div class="icon">✅</div><h2>対応完了</h2><p>' + (meta.title || GP.id) + ' の手順を確認しました。</p><button type="button" class="btn-restart" data-gp="restart">🔄 最初から</button></div>';
  } else {
    const th = (stp.theme || 'theme-red');
    const nextHidden = (GP.id === '2-1' && pidx === 1 && !GP.branch21) ? ' style="display:none !important"' : '';
    const nextLabel = (GP.id === '2-1' && GP.idx >= 2) || (GP.id !== '2-1' && GP.idx >= maxStepDisplay()) ? '完了 ✓' : '次のステップへ →';
    const btnColor = stp.btnColor || 'red';
    body.innerHTML = '<header><div class="label">' + GP.id + ' ／ ' + (getGuideMeta(GP.id) || {}).title + '</div><div class="title">🏥 震災アクションガイド</div><div class="progress-bar-wrap"><div class="progress-bar-inner" id="gpProgress" style="width:' + (stp.progress != null ? stp.progress : 50) + '%"></div></div></header><div class="step-indicator" id="gpDots"></div><div class="card-wrap"><div class="card ' + th + '"><div class="card-header"><span class="step-badge">' + (stp.badgeText || '') + '</span><span class="step-title">' + (stp.title || '') + '</span></div><div class="card-body">' + adaptGuideInlineHandlers(stp.innerHTML || '') + '<div class="btn-wrap"' + nextHidden + '><button type="button" class="btn-next ' + btnColor + '" data-gp="next">' + nextLabel + '</button></div></div></div></div>';
    setTimeout(() => { buildDots(); }, 0);
  }
  wrap.appendChild(st);
  wrap.appendChild(body);
  root.innerHTML = '';
  root.appendChild(wrap);
  bindGpEvents(body);
}
function openGuide(id) {
  if (!getGuideMeta(id) || !getGuideData(id)) return;
  GP.id = id;
  GP.idx = 0;
  GP.done = (id === '6-2' || id === '8-5') && state.ackSubmit && state.ackSubmit[id] === true;
  GP.branch21 = null;
  const m = getGuideMeta(id);
  const vt = document.getElementById('viewerTitle');
  if (vt) vt.textContent = m.title;
  addRecent(id);
  document.body.classList.add('in-viewer');
  $('hubView').classList.remove('active');
  $('viewerView').classList.add('active');
  if (location.hash !== '#' + id) history.pushState({ guideId: id }, '', '#' + id);
  GP_render();
}
function closeGuide() {
  document.body.classList.remove('in-viewer');
  $('viewerView').classList.remove('active');
  $('hubView').classList.add('active');
  if (location.hash) history.pushState({}, '', location.pathname + location.search);
  GP.id = null;
  if ($('guideRoot')) $('guideRoot').innerHTML = '';
}
function tryHash() {
  const h = (location.hash || '').replace(/^#/, '').trim();
  if (h && getGuideData(h) && getGuideMeta(h)) openGuide(h);
}
function renderHub() {
  const q = ($('searchInput') && $('searchInput').value.toLowerCase().trim()) || '';
  CATEGORIES.forEach((cat) => {
    const el = document.getElementById('cat-' + cat.id);
    if (!el) return;
    const list = cat.ids
      .map((id) => GUIDE_CATALOG.find((g) => g.id === id))
      .filter((g) => g && matchSearch(g, q));
    if (!list.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    el.innerHTML = '<div class="section-title ' + cat.color + '">' + cat.label + '</div><div class="card-grid">' + list
      .map(
        (g) => {
          const acked = state.ackSubmit && state.ackSubmit[g.id];
          return (
            '<button type="button" class="guide-card ' + g.color + '" data-id="' + g.id + '"><div class="icon-box">' + (g.icon || '📄') + '</div><div class="info"><div class="code">' + g.id + (acked ? ' <span class="guide-ack-badge">提出済</span>' : '') + '</div><div class="title">' + g.title + '</div><div class="desc">' + g.desc + '</div></div></button>'
          );
        }
      )
      .join('') + '</div>';
  });
  const raw = (state.recent || []).filter((id) => getGuideMeta(id) && getGuideData(id) && (!q || matchSearch(getGuideMeta(id), q)));
  const rw = $('recentWrap');
  const rg = $('recentGrid');
  if (raw.length && rw && rg) {
    rw.style.display = '';
    rg.innerHTML = raw
      .map((id) => {
        const g = getGuideMeta(id);
        const acked = state.ackSubmit && state.ackSubmit[id];
        return (
          '<button type="button" class="guide-card ' + g.color + '" data-id="' + id + '"><div class="icon-box">' + (g.icon || '') + '</div><div class="info"><div class="code">' + id + (acked ? ' <span class="guide-ack-badge">提出済</span>' : '') + '</div><div class="title">' + g.title + '</div><div class="recent-bar">前回表示</div></div></button>'
        );
      })
      .join('');
  } else if (rw) rw.style.display = 'none';
}
function onHubClick(e) {
  const b = e.target.closest('button.guide-card[data-id]');
  if (b) openGuide(b.getAttribute('data-id'));
}
function updateApp() {
  if (!confirm('アプリを最新版に更新しますか？\n（キャッシュを削除して再読み込みします）')) return;
  if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then((r) => r.forEach((x) => x.unregister()));
  if ('caches' in window) caches.keys().then((n) => n.forEach((x) => caches.delete(x)));
  setTimeout(function () { location.reload(); }, 500);
}
function hideSplash() {
  const sp = document.getElementById('splash');
  if (sp) {
    sp.classList.add('splash--hide');
    sp.setAttribute('aria-hidden', 'true');
  }
}
document.addEventListener('DOMContentLoaded', function () {
  if (!document.getElementById('gp-hub-ack-style')) {
    const st = document.createElement('style');
    st.id = 'gp-hub-ack-style';
    st.textContent = '.guide-ack-badge{font-size:10px;font-weight:800;background:#166534;color:#fff;padding:2px 7px;border-radius:6px;margin-left:4px;vertical-align:middle;white-space:nowrap}';
    document.head.appendChild(st);
  }
  loadState();
  CATEGORIES.forEach((cat) => {
    const w = document.getElementById('categoryWrap');
    if (!w) return;
    const d = document.createElement('div');
    d.id = 'cat-' + cat.id;
    w.appendChild(d);
  });
  renderHub();
  const sw = $('searchWrap');
  const si = $('searchInput');
  if (sw && si) {
    si.addEventListener('input', function () { sw.classList.toggle('has-text', !!si.value); renderHub(); });
  }
  const cb = $('clearBtn');
  if (cb && si) {
    cb.addEventListener('click', function () {
      si.value = '';
      if (sw) sw.classList.remove('has-text');
      renderHub();
      si.focus();
    });
  }
  $('hubView') && $('hubView').addEventListener('click', onHubClick);
  const bb = document.getElementById('backBtn');
  if (bb) bb.addEventListener('click', closeGuide);
  const ub = document.getElementById('updateBtn');
  if (ub) ub.addEventListener('click', updateApp);
  const vub = document.getElementById('viewerUpdateBtn');
  if (vub) vub.addEventListener('click', updateApp);
  tryHash();
  window.addEventListener('popstate', function () {
    const h = (location.hash || '').replace(/^#/, '').trim();
    if (h) openGuide(h);
    else closeGuide();
  });
  setTimeout(hideSplash, 650);
});


if ('serviceWorker' in navigator && window.isSecureContext) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./service-worker.js').catch(function () {
      // Service worker registration is optional; the app still works as a normal HTML file.
    });
  });
}
